databases:
  - name: financeos-db
    databaseName: financeosdb
    user: financeosuser
    plan: free
    region: singapore

services:
  - type: web
    name: financeos-api
    runtime: python
    region: singapore
    plan: free
    rootDir: finance-os-backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: financeos-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 15
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      - key: DEFAULT_CURRENCY
        value: INR
      - key: REPORTS_DIR
        value: ./reports
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FRONTEND_URL
        value: https://financeos-ui.onrender.com

  - type: web
    name: financeos-ui
    runtime: static
    plan: free
    rootDir: finance-os-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://financeos-api.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html