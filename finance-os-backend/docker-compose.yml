version: "3.9"
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: financeosdb
      POSTGRES_USER: financeosuser
      POSTGRES_PASSWORD: financeospass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financeosuser -d financeosdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    environment:
      DATABASE_URL: postgresql://financeosuser:financeospass@db:5432/financeosdb
      SECRET_KEY: your-super-secret-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 7
    volumes:
      - ./reports:/app/reports
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ../finance-os-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
